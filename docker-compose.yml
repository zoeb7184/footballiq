# FootballIQ Enterprise — local runtime (ADR-0003: local-first, Azure-ready)
services:
  warehouse:
    # pgvector/pgvector:pg16 = Postgres 16 + the `vector` extension (Module 7
    # RAG store). Same PG major version as before, so the data volume is reused.
    image: pgvector/pgvector:pg16
    container_name: fiq-warehouse
    environment:
      POSTGRES_USER: fiq
      POSTGRES_PASSWORD: fiq_local_dev  # local dev only; Key Vault in Azure (ADR-0003)
      POSTGRES_DB: footballiq
    ports:
      - "5432:5432"
    volumes:
      - warehouse_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fiq -d footballiq"]
      interval: 2s
      timeout: 3s
      retries: 15

  bi:
    image: metabase/metabase:latest
    container_name: fiq-bi
    ports:
      - "3000:3000"
    environment:
      MB_DB_FILE: /metabase-data/metabase.db  # app DB on a volume (local dev)
    volumes:
      - bi_data:/metabase-data
    depends_on:
      warehouse:
        condition: service_healthy
    # Connects to the warehouse as fiq_api (gold-only SELECT, grant-enforced):
    # host=warehouse port=5432 db=footballiq user=fiq_api pw=fiq_api_local_dev

volumes:
  warehouse_data:
  bi_data:
