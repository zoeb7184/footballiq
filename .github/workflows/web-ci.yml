# Web frontend quality gate — mirrors the local checks verbatim,
# same philosophy as the backend ci.yml.

name: web-ci

on:
  push:
    branches: [main]
    paths: ["web/**"]
  pull_request:
    paths: ["web/**"]

jobs:
  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - name: Lint
        run: npx eslint src --max-warnings 0
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Build
        run: npx next build
